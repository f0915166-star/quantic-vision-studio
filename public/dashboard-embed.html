function DataProvider({children}) {

      if (equipos.size && !equipos.has(m.equipo)) return false;
      if (biens.size && !biens.has(m.bien)) return false;
      if (responsables.size && !responsables.has(m.responsable)) return false;

// ---------- ChartPanel ----------
function ChartPanel({title,subtitle,kicker,children,actions,exportData}) {
  const [full,setFull] = useState(false);
  const onExport = () => {
    if (!exportData) return;
    const {filename,csv} = exportData();
    const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <section className={full?"panel panel-glow fixed flex flex-col":"panel p-5 flex flex-col"}
      style={full?{inset:'1rem',zIndex:50,padding:'1.25rem'}:{}}>
      <header className="flex items-start justify-between gap-3 mb-4">
        <div>
          {kicker && <div className="text-[10px] uppercase font-semibold mb-1" style={{letterSpacing:'.2em',color:'oklch(.78 .18 165 / .8)'}}>{kicker}</div>}

  );
}

function KpiCard({label,value,sublabel,delta,icon,accent="primary"}) {
  const trendIcon = delta==null?<IMinus/>:delta>0?<ITrend/>:delta<0?<ITrendDn/>:<IMinus/>;
  const trendColor = delta==null?'var(--muted-foreground)':delta>0?'var(--success)':delta<0?'var(--destructive)':'var(--muted-foreground)';
  return (
    <button className="panel kpi-pulse">
      <div className="kpi-glow" style={{background:accentGrad[accent]}}/>
      <div className="relative flex items-start justify-between mb-3">
        <span className="text-[11px] uppercase text-muted-foreground font-medium" style={{letterSpacing:'.15em'}}>{label}</span>
        {icon && <span className="text-muted-foreground">{icon}</span>}
      </div>
      <div className="relative font-mono font-semibold tabular-nums tracking-tight" style={{fontSize:value.length>12?Math.max(14,30-(value.length-12)*1.1)+'px':'1.875rem',lineHeight:1.1,wordBreak:'break-word'}}>{value}</div>
      <div className="relative mt-2 flex items-center gap-2 text-xs">
        {delta!=null && <span className="inline-flex items-center gap-1 font-medium" style={{color:trendColor}}>{trendIcon}{Math.abs(delta).toFixed(1)}%</span>}

// ---------- ActiveFilters ----------
function ActiveFilters() {
  const {filters,toggleFilter,setDateRange,reset} = useData();
  const items=[];
  filters.categorias.forEach(v=>items.push({dim:'categorias',label:'Categoría',value:v}));

  filters.responsables.forEach(v=>items.push({dim:'responsables',label:'Responsable',value:v}));

// ---------- TreemapChart ----------
const TM_COLORS = ['var(--chart-1)','var(--chart-2)','var(--chart-3)','var(--chart-4)','var(--chart-5)','var(--chart-6)','var(--chart-7)','var(--chart-8)'];
function TreemapChart({data}) {
  const {toggleFilter} = useData();
  const tree = useMemo(()=>{
    const m=new Map();for(const r of data)m.set(r.categoria,(m.get(r.categoria)??0)+r.costo);
    return [...m.entries()].sort((a,b)=>b[1]-a[1]).map(([name,size],i)=>({name,size,weight:Math.pow(size,.62),fill:TM_COLORS[i%TM_COLORS.length]}));
  },[data]);
  const Content = props => {
    const {x,y,width,height,name,fill,size} = props;
    if(!name||width<=0||height<=0) return <g/>;
    const mn=Math.min(width,height);
    const nf=Math.max(10,Math.min(16,Math.round(mn/10)));
    const cf=Math.max(9,Math.min(12,Math.round(mn/14)));
    const showN=width>44&&height>22, showC=width>70&&height>44;
    const padX=8, padY=nf+6;
    const mc=Math.max(4,Math.floor((width-padX*2)/(nf*.6)));
    const disp=name.length>mc?name.slice(0,mc-1)+'…':name;
    return <g style={{cursor:'pointer'}} onClick={()=>toggleFilter('categorias',name)}>
      <rect x={x} y={y} width={width} height={height} fill={fill} fillOpacity={.92} stroke="var(--background)" strokeWidth={2} rx={6}/>
      {showN && <text x={x+padX} y={y+padY} fontSize={nf} fontWeight={800} fill="#fff" stroke="rgba(0,0,0,.55)" strokeWidth={3} strokeLinejoin="round" paintOrder="stroke" style={{letterSpacing:'.02em',textTransform:'uppercase'}}>{disp}</text>}
      {showC && <text x={x+padX} y={y+padY+cf+4} fontSize={cf} fontFamily="monospace" fontWeight={700} fill="#fff" stroke="rgba(0,0,0,.55)" strokeWidth={2.5} strokeLinejoin="round" paintOrder="stroke">{fmtCurrency(size??0)}</text>}
    </g>;
  };
  return (
    <ChartPanel title="Treemap proporcional" kicker="Composición">
      <R.ResponsiveContainer width="100%" height={340}>
        <R.Treemap data={tree} dataKey="weight" stroke="var(--background)" animationDuration={400} content={<Content/>}>
          <R.Tooltip content={({active,payload})=>{if(!active||!payload?.length)return null;const p=payload[0].payload;return <div className="panel px-3 py-2 text-xs font-mono"><div className="font-semibold">{p.name}</div><div className="text-primary">{fmtCurrency(p.size)}</div></div>;}}/>
        </R.Treemap>
      </R.ResponsiveContainer>
    </ChartPanel>
  );
}

// ---------- TopTable ----------
function TopTable({data}) {
  const {toggleFilter,filters} = useData();
  const [q,setQ] = useState("");
  const [sortKey,setSortKey] = useState("fecha");
  const [dir,setDir] = useState("desc");
  const [page,setPage] = useState(0);
  const PAGE = 15;
  const filtered = useMemo(()=>{const s=q.trim().toLowerCase();return s?data.filter(r=>r.bien.toLowerCase().includes(s)||r.concepto.toLowerCase().includes(s)||r.responsable.toLowerCase().includes(s)):data;},[data,q]);
  const sorted = useMemo(()=>{const a=[...filtered];a.sort((x,y)=>{const av=x[sortKey],bv=y[sortKey];if(typeof av==='number'&&typeof bv==='number')return dir==='asc'?av-bv:bv-av;return dir==='asc'?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));});return a;},[filtered,sortKey,dir]);
  const totalPages = Math.max(1,Math.ceil(sorted.length/PAGE));
  const pageData = sorted.slice(page*PAGE,page*PAGE+PAGE);
  const setSort = k => {if(k===sortKey)setDir(d=>d==='asc'?'desc':'asc');else{setSortKey(k);setDir(k==='fecha'||k==='costo'||k==='cantidad'?'desc':'asc');}setPage(0);};
  const cols = [['fecha','Fecha'],['bien','Bien'],['concepto','Concepto'],['responsable','Responsable'],['cantidad','Cantidad'],['unidad','Unidad'],['costo','Costo']];
  return (
    <ChartPanel title="Historial de movimientos" kicker="Detalle operativo"
      exportData={()=>({filename:"historial_movimientos.csv",csv:"fecha,bien,concepto,responsable,cantidad,unidad,costo\n"+sorted.map(r=>`${r.fecha},"${r.bien.replace(/"/g,'""')}","${r.concepto.replace(/"/g,'""')}","${r.responsable.replace(/"/g,'""')}",${r.cantidad},${r.unidad},${r.costo}`).join("\n")})}
      actions={<div style={{position:'relative',marginRight:4}}><ISearch/><input type="text" value={q} onChange={e=>{setQ(e.target.value);setPage(0);}} placeholder="Buscar…" style={{paddingLeft:24,width:176}}/><span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',color:'var(--muted-foreground)'}}><ISearch/></span></div>}>
      <div className="overflow-x-auto">
        <table className="text-xs">
          <thead><tr style={{borderBottom:'1px solid var(--border)'}} className="text-[10px] uppercase text-muted-foreground">
            {cols.map(([k,l])=>(<th key={k} className="py-2 px-2 font-medium"><button onClick={()=>setSort(k)} className="inline-flex items-center gap-1 hover:text-foreground">{l} <span style={{opacity:sortKey===k?1:.4,color:sortKey===k?'var(--primary)':'inherit'}}><IArrUp/></span></button></th>))}
          </tr></thead>
          <tbody>
            {pageData.map((r,i)=>{
              const a=filters.biens.has(r.bien);
              return <tr key={`${r.fecha}-${r.bien}-${i}`} onClick={()=>toggleFilter('biens',r.bien)} className="cursor-pointer hover:bg-primary/5" style={{borderBottom:'1px solid oklch(.3 .018 250 / .2)',background:a?'oklch(.78 .18 165 / .1)':'transparent'}}>
                <td className="py-2 px-2 font-mono text-muted-foreground whitespace-nowrap">{r.fecha||'—'}</td>
                <td className="py-2 px-2 font-medium truncate" style={{maxWidth:360}} title={r.bien}>{r.bien}</td>
                <td className="py-2 px-2 text-muted-foreground truncate" style={{maxWidth:240}} title={r.concepto}>{r.concepto}</td>
                <td className="py-2 px-2 text-muted-foreground truncate" style={{maxWidth:180}} title={r.responsable}>{r.responsable||'—'}</td>
                <td className="py-2 px-2 font-mono tabular-nums">{fmtCompact(r.cantidad)}</td>
                <td className="py-2 px-2 font-mono text-[10px] uppercase text-muted-foreground">{r.unidad}</td>
                <td className="py-2 px-2 font-mono tabular-nums text-primary">{fmtCurrency(r.costo)}</td>
              </tr>;
            })}
            {pageData.length===0 && <tr><td colSpan={7} className="py-6 text-center text-muted-foreground text-xs">Sin movimientos.</td></tr>}
          </tbody>
        </table>
      </div>
      <div className="flex items-center justify-between mt-3 text-[11px] text-muted-foreground">
        <span>{sorted.length===0?0:page*PAGE+1}–{Math.min(sorted.length,(page+1)*PAGE)} de {sorted.length}</span>
        <div className="flex items-center gap-1">
          <button disabled={page===0} onClick={()=>setPage(p=>p-1)} className="p-1 rounded hover:bg-secondary disabled:opacity-30"><IChevL/></button>
          <span className="font-mono px-2">{page+1} / {totalPages}</span>
          <button disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)} className="p-1 rounded hover:bg-secondary disabled:opacity-30"><IChevR/></button>
        </div>
      </div>
    </ChartPanel>
  );
}

// ---------- FilterSidebar ----------
function FilterSidebar({open,onClose}) {
  const {all,filters,toggleFilter,setFilter,setDateRange} = useData();
  const [section,setSection] = useState("equipo");
  const counts = useMemo(()=>{
    const c={cats:new Map(),equipos:new Map(),areas:new Map(),resps:new Map()};
    for(const r of all){c.cats.set(r.categoria,(c.cats.get(r.categoria)??0)+1);c.equipos.set(r.equipo,(c.equipos.get(r.equipo)??0)+1);c.areas.set(r.area,(c.areas.get(r.area)??0)+1);c.resps.set(r.responsable,(c.resps.get(r.responsable)??0)+1);}
    return c;
  },[all]);
  const sortFn = m => [...m.entries()].sort((a,b)=>b[1]-a[1]);
  if (!open) return null;
  return <>
    <div onClick={onClose} className="fixed inset-0 backdrop" style={{zIndex:30}}/>
    <aside className="sidebar panel panel-glow" style={{zIndex:40}}>
      <header className="flex items-center justify-between p-4" style={{borderBottom:'1px solid var(--border)'}}>
        <div className="flex items-center gap-2"><IFilter/><h3 className="font-semibold text-sm" style={{margin:0}}>Filtros avanzados</h3></div>
        <button onClick={onClose} className="p-1 rounded-md hover:bg-secondary text-muted-foreground"><IX/></button>
      </header>
      <div className="p-4" style={{borderBottom:'1px solid var(--border)'}}>
        <div className="text-[10px] uppercase text-muted-foreground font-semibold flex items-center gap-1 mb-2" style={{letterSpacing:'.15em'}}><ICal/> Periodo</div>
        <div className="grid grid-cols-2 gap-2">
          <input type="date" value={filters.dateFrom??''} onChange={e=>setDateRange(e.target.value||null,filters.dateTo)}/>
          <input type="date" value={filters.dateTo??''} onChange={e=>setDateRange(filters.dateFrom,e.target.value||null)}/>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto">
        <Section icon={<ITruck/>} label="Equipo móvil" open={section==='equipo'} onToggle={()=>setSection(s=>s==='equipo'?null:'equipo')} count={filters.equipos.size}>
          <Chips items={sortFn(counts.equipos)} active={filters.equipos} onToggle={v=>toggleFilter('equipos',v)} onSelectAll={items=>setFilter('equipos',items.map(([v])=>v))} onClear={()=>setFilter('equipos',[])}/>
        </Section>
        <Section icon={<ITags/>} label="Categoría" open={section==='cat'} onToggle={()=>setSection(s=>s==='cat'?null:'cat')} count={filters.categorias.size}>
          <Chips items={sortFn(counts.cats)} active={filters.categorias} onToggle={v=>toggleFilter('categorias',v)} onSelectAll={items=>setFilter('categorias',items.map(([v])=>v))} onClear={()=>setFilter('categorias',[])}/>
        </Section>
        <Section icon={<IBld/>} label="Área responsable" open={section==='area'} onToggle={()=>setSection(s=>s==='area'?null:'area')} count={filters.areas.size}>
          <Chips items={sortFn(counts.areas)} active={filters.areas} onToggle={v=>toggleFilter('areas',v)} onSelectAll={items=>setFilter('areas',items.map(([v])=>v))} onClear={()=>setFilter('areas',[])}/>
        </Section>
        <Section icon={<IUsers/>} label="Responsable" open={section==='resp'} onToggle={()=>setSection(s=>s==='resp'?null:'resp')} count={filters.responsables.size}>
          <Chips items={sortFn(counts.resps).slice(0,60)} active={filters.responsables} onToggle={v=>toggleFilter('responsables',v)} onSelectAll={items=>setFilter('responsables',items.map(([v])=>v))} onClear={()=>setFilter('responsables',[])}/>
        </Section>
      </div>
    </aside>
  </>;
}
function Section({icon,label,open,onToggle,count,children}) {
  return <div style={{borderBottom:'1px solid var(--border)'}}>
    <button onClick={onToggle} className="w-full flex items-center justify-between px-4 py-3 hover:bg-secondary">
      <div className="flex items-center gap-2 text-xs font-semibold">{icon} {label}{count>0 && <span className="text-[10px] bg-primary/20 text-primary px-1.5 py-1 rounded-full font-mono">{count}</span>}</div>
      <span className="text-muted-foreground transition-transform" style={{transform:open?'rotate(180deg)':'none'}}><IChev/></span>
    </button>
    {open && <div style={{maxHeight:'18rem',overflowY:'auto',padding:'0 .75rem .75rem'}}>{children}</div>}
  </div>;
}
function Chips({items,active,onToggle,onSelectAll,onClear}) {
  return <div className="flex flex-col gap-1">
    <div className="flex items-center gap-1.5 sticky top-0 bg-card/95 py-1 z-10" style={{marginBottom:'.375rem'}}>
      <button onClick={()=>onSelectAll(items)} className="text-[10px] font-semibold uppercase px-2 py-1 rounded-md bg-primary/15 text-primary hover:bg-primary/25" style={{letterSpacing:'.05em'}}>✓ Todo</button>
      <button onClick={onClear} disabled={active.size===0} className="text-[10px] font-semibold uppercase px-2 py-1 rounded-md bg-secondary/60 text-muted-foreground hover:bg-secondary hover:text-foreground disabled:opacity-40" style={{letterSpacing:'.05em'}}>✕ Limpiar</button>
      <span className="ml-auto text-[10px] font-mono text-muted-foreground">{active.size}/{items.length}</span>
    </div>
    {items.map(([v,n])=>{
      const checked=active.has(v);
      return <label key={v} className="flex items-center gap-2 px-2 py-1.5 rounded-md cursor-pointer transition-colors border" style={{background:checked?'oklch(.78 .18 165 / .1)':'oklch(.28 .025 250/.4)',borderColor:checked?'oklch(.78 .18 165 / .4)':'transparent'}}>
        <input type="checkbox" checked={checked} onChange={()=>onToggle(v)}/>
        <span className="truncate text-xs flex-1" title={v}>{v||'(sin valor)'}</span>
        <span className="text-[10px] opacity-60 font-mono shrink-0">{n}</span>
      </label>;
    })}
  </div>;
}

// ---------- Shell ----------
function DashboardShell() {
  const {all,filtered,filters,reset} = useData();
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const stats = useMemo(()=>{
    const costo = filtered.reduce((s,r)=>s+r.costo,0);
    const dates = filtered.map(r=>r.fecha).filter(Boolean).sort();
    let delta;
    if(dates.length>10){const mid=dates[Math.floor(dates.length/2)];let a=0,b=0;for(const r of filtered)(r.fecha<mid?a+=r.costo:b+=r.costo);if(a>0)delta=((b-a)/a)*100;}
    const eqMap=new Map(),bMap=new Map();
    for(const r of filtered){eqMap.set(r.equipo,(eqMap.get(r.equipo)??0)+r.costo);bMap.set(r.bien,(bMap.get(r.bien)??0)+r.costo);}
    let topEq="",topEqV=0;eqMap.forEach((v,k)=>{if(v>topEqV){topEqV=v;topEq=k;}});
    let topB="",topBV=0;bMap.forEach((v,k)=>{if(v>topBV){topBV=v;topB=k;}});
    const monthly=new Map();for(const r of filtered){const k=r.fecha?.slice(0,7);if(!k)continue;monthly.set(k,(monthly.get(k)??0)+r.costo);}
    const monthsCount=monthly.size;const avgMonth=monthsCount?costo/monthsCount:0;
    let pk="",pv=0;monthly.forEach((v,k)=>{if(v>pv){pv=v;pk=k;}});
    const peakLabel=pk?`${MES[Number(pk.slice(5,7))-1]} ${pk.slice(2,4)}`:'—';
    return {costo,n:filtered.length,delta,avgMonth,monthsCount,peakLabel,peakVal:pv,topEquipo:topEq,topEquipoVal:topEqV,topBien:topB,topBienVal:topBV};
  },[filtered]);
  const activeCount = filters.categorias.size+filters.equipos.size+filters.areas.size+filters.biens.size+filters.responsables.size;
  return <div className="min-h-screen">
    <FilterSidebar open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
    <main className="px-4 lg:px-8 py-3 space-y-5 max-w-[1800px] mx-auto" style={{paddingTop:'1.5rem',paddingBottom:'1.5rem'}}>
      <div className="fade-in">
        <div className="flex items-end justify-between gap-4 flex-wrap mb-1">
          <div className="flex items-start gap-4">
            <button onClick={()=>setSidebarOpen(v=>!v)} className="panel px-3 py-2 flex items-center gap-2 text-xs font-semibold mt-1"><IFilter/> Filtros{activeCount>0 && <span className="bg-primary text-primary-foreground rounded-full px-1.5 text-[10px] font-mono">{activeCount}</span>}</button>
            <div>
              <div className="text-[10px] uppercase text-primary font-semibold" style={{letterSpacing:'.25em'}}>Dashboard ejecutivo</div>
              <h2 className="text-2xl lg:text-3xl font-bold tracking-tight" style={{margin:'.25rem 0 0'}}>Costos de <span className="text-gradient">Repuestos & Combustible</span> · Flota móvil</h2>
              {filtered.length!==all.length && <p className="text-sm text-muted-foreground mt-1">{`Filtro activo · ${fmtCompact(filtered.length)} de ${fmtCompact(all.length)} movimientos`}</p>}
            </div>
          </div>
          <button onClick={reset} className="text-xs text-muted-foreground hover:text-foreground panel px-3 py-1.5">Reset visual</button>
        </div>
      </div>
      <ActiveFilters/>
      <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
        <KpiCard label="Costo total" value={fmtCurrency(stats.costo)} sublabel="vs primer semestre" delta={stats.delta} icon={<IDollar/>} accent="primary"/>
        <KpiCard label="Promedio mensual" value={fmtCurrency(stats.avgMonth)} sublabel={`${stats.monthsCount} meses activos`} icon={<ITrend/>} accent="accent"/>
        <KpiCard label="Mes pico" value={stats.peakLabel} sublabel={fmtCurrency(stats.peakVal)} icon={<ICalR/>} accent="warning"/>
        <KpiCard label="Movimientos" value={fmtCompact(stats.n)} sublabel="registros operativos" icon={<IActivity/>} accent="accent"/>
        <KpiCard label="Equipo más costoso" value={stats.topEquipo?(stats.topEquipo.length>22?stats.topEquipo.slice(0,22)+'…':stats.topEquipo):'—'} sublabel={fmtCurrency(stats.topEquipoVal)} icon={<ITruck/>} accent="info"/>
        <KpiCard label="Bien más costoso" value={stats.topBien?(stats.topBien.length>22?stats.topBien.slice(0,22)+'…':stats.topBien):'—'} sublabel={fmtCurrency(stats.topBienVal)} icon={<ILayers/>} accent="warning"/>
      </div>
      <TrendChart data={filtered}/>
      <div className="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <div className="lg:col-span-6"><EquipoChart data={filtered}/></div>
        <div className="lg:col-span-3"><AreaDonut data={filtered}/></div>
        <div className="lg:col-span-3"><CategoriaDonut data={filtered} allData={all}/></div>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <ParetoChart data={filtered}/>
        <ResponsableRanking data={filtered}/>
      </div>
      <div className="grid grid-cols-1 gap-4"><TreemapChart data={filtered}/></div>
      <TopTable data={filtered}/>
      <footer className="text-center text-[11px] text-muted-foreground font-mono py-6">NEXUS·OPS v1.1 (embebido) · {MOVEMENTS.length.toLocaleString('es-PE')} movimientos</footer>
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<DataProvider><DashboardShell/></DataProvider>);
</script>
</body></html>
